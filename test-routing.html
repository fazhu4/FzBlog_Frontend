<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路由测试</title>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        // 简单的路由测试
        const app = document.getElementById('app');

        // 模拟首页内容
        function showHomePage() {
            app.innerHTML = `
                <h1>博客首页</h1>
                <p>这是博客首页内容</p>
                <button onclick="navigateToArticle(1)">查看文章 1</button>
                <button onclick="navigateToArticle(2)">查看文章 2</button>
            `;
        }

        // 模拟文章详情页内容
        function showArticleDetail(id) {
            app.innerHTML = `
                <h1>文章 ${id} - Vue 3入门指南</h1>
                <p>这是文章的详细内容...</p>
                <button onclick="navigateToHome()">返回首页</button>
            `;
        }

        // 导航函数
        function navigateToArticle(id) {
            window.history.pushState({}, '', `/article/${id}`);
            showArticleDetail(id);
        }

        function navigateToHome() {
            window.history.pushState({}, '', '/');
            showHomePage();
        }

        // 监听浏览器前进/后退
        window.addEventListener('popstate', () => {
            if (window.location.pathname === '/') {
                showHomePage();
            } else if (window.location.pathname.startsWith('/article/')) {
                const id = window.location.pathname.split('/')[2];
                showArticleDetail(id);
            }
        });

        // 初始化
        showHomePage();
    </script>
</body>
</html>
